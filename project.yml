name: HotBod
options:
  bundleIdPrefix: com.hotbod
  deploymentTarget:
    iOS: "17.0"
  # Xcode 16+ embeds watch apps in PlugIns/ (not Watch/). Matches local Xcode 26.x.
  xcodeVersion: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  Pow:
    url: https://github.com/EmergeTools/Pow
    from: "1.0.0"
targets:
  HotBod:
    type: application
    platform: iOS
    sources:
      - path: HotBod
        excludes:
          - "**/.DS_Store"
          - "Tests/**"
          - "Resources/**/*.example"
          - "Resources/ExerciseSeed.csv"
      - path: HotBodShared
    resources:
      - path: HotBod/Resources
        excludes:
          - "**/*.example"
          - "**/ExerciseSeed.csv"
          - "**/.DS_Store"
    entitlements:
      path: HotBod/HotBod.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.application-groups:
          - group.com.hotbod.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hotbod.app
        INFOPLIST_KEY_CFBundleDisplayName: HotBod
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "HotBod uses your photo library for progress photos."
        INFOPLIST_KEY_NSCameraUsageDescription: "HotBod uses the camera to take progress photos."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "HotBod reads sleep and resting heart rate to show optional recovery hints. Not used for medical diagnosis."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "HotBod saves completed strength workouts to Apple Health when you enable export."
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: HotBod/HotBod.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Pow
        product: Pow
      # Embeds HotBodWatch in HotBod.app/PlugIns/ (Xcode 16+). Requires watchOS SDK
      # to compile the watch target. A watchOS Simulator runtime is only needed to
      # run the watch app in Simulator — not for xcodebuild CI/archive builds.
      - target: HotBodWatch
        embed: true
        copy:
          destination: plugins
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            cd "${SRCROOT}"
            swiftlint
          else
            echo "warning: SwiftLint not installed. Run: brew install swiftlint"
          fi
  HotBodWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: HotBodWatch
      - path: HotBodShared
    entitlements:
      path: HotBodWatch/HotBodWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hotbod.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hotbod.app.watchkitapp
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.hotbod.app
        INFOPLIST_KEY_CFBundleDisplayName: HotBod
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: HotBodWatch/HotBodWatch.entitlements
        SKIP_INSTALL: YES
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
  HotBodTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HotBod/Tests
        excludes:
          - "**/UITests/**"
    dependencies:
      - target: HotBod
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hotbod.app.tests
        GENERATE_INFOPLIST_FILE: YES
  HotBodUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HotBod/Tests/UITests
    dependencies:
      - target: HotBod
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hotbod.app.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: HotBod
schemes:
  HotBod:
    build:
      targets:
        HotBod: all
        HotBodWatch: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - HotBodTests
        - HotBodUITests
      testPlans:
        - path: HotBod.xcodeproj/xcshareddata/xctestplans/HotBod.xctestplan
          defaultPlan: true
